    - make TARGET=nucleo_wba65ri FIRMWARE_PRODUCT=nfc NFC_USB_MODE=cdc INSTALL_DEPS=0 AUTO_INSTALL_LINUX_DEPS=0 firmware
    - make TARGET=nucleo_wba65ri FIRMWARE_PRODUCT=reader NFC_USB_MODE=ccid INSTALL_DEPS=0 AUTO_INSTALL_LINUX_DEPS=0 firmware
