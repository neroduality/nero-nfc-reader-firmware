# Host-side CI on linux/amd64 GitHub runners: lint gate, then container matrix (`make test`).
# Runs on push/PR, and workflow_dispatch.
# Local reproduction: make ci-local;
name: Main CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: Lint (make lint)
    runs-on: ubuntu-24.04
    container:
      image: debian:sid-slim@sha256:54f7a23f03be1e9fe2849c61a7455588ea29b84c1659440f8ece2aea4c9871af
      options: --platform linux/amd64
    timeout-minutes: 360

    steps:
      # Inline: repo scripts are not available until after checkout.
      # python3 + PyYAML: resolve lint kit pin from .github/lint-c-cpp.yaml
      # before the second checkout (local/ci-local already have these).
      - name: Install checkout prerequisites
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq
            apt-get install -y --no-install-recommends \
              ca-certificates git tar python3 python3-yaml
          elif command -v dnf >/dev/null 2>&1; then
            dnf install -y --setopt=install_weak_deps=False \
              ca-certificates git tar python3 python3-pyyaml
            dnf clean all
          else
            printf 'error: unsupported base image (need apt-get or dnf)\n' >&2
            exit 1
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Pin from toolchain.lint_kit in .github/lint-c-cpp.yaml.
      # After checkout, cwd is the workspace mount — use pwd/relative paths
      # (not ${{ github.workspace }}, which is the host path inside job containers).
      - name: Resolve lint kit version
        id: lint_kit_cfg
        run: bash .github/scripts/lint-kit-config.sh --github-output "$(pwd)"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ steps.lint_kit_cfg.outputs.repository }}
          ref: ${{ steps.lint_kit_cfg.outputs.ref }}
          path: .lint-kit-org
          persist-credentials: false

      - name: Lint (strict tools)
        env:
          CI_SKIP_CHECKOUT_PREREQUISITES: "1"
          LINT_KIT: .lint-kit-org/lint-c-cpp
        run: bash .github/scripts/ci-run-lint.sh

  test:
    name: Test (${{ matrix.name }})
    needs: [lint]
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: debian-sid
            name: Debian sid
            image: debian:sid-slim@sha256:54f7a23f03be1e9fe2849c61a7455588ea29b84c1659440f8ece2aea4c9871af
          - id: fedora-43
            name: Fedora 43
            image: fedora:43@sha256:762d73ba1c455232b0272c5d445a34f36c4b9f421cbc05ce8102552325b6a222

    container:
      image: ${{ matrix.image }}
      options: --platform linux/amd64

    env:
      AUTO_INSTALL_LINUX_DEPS: "1"
      INSTALL_DEPS: "1"
      INSTALL_LINT_DEPS: "0"

    steps:
      # Inline: repo scripts are not available until after checkout.
      - name: Install checkout prerequisites
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq
            apt-get install -y --no-install-recommends ca-certificates git tar
          elif command -v dnf >/dev/null 2>&1; then
            dnf install -y --setopt=install_weak_deps=False ca-certificates git tar
            dnf clean all
          else
            printf 'error: unsupported base image (need apt-get or dnf)\n' >&2
            exit 1
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Release unit tests (fresh CMake; ci-run-test-container.sh)
        env:
          CI_SKIP_CHECKOUT_PREREQUISITES: "1"
        run: bash .github/scripts/ci-run-test-container.sh
