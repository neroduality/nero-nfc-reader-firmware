# Consumer lint manifest for the org kit.

compile_db:
  firmware:
    - commands:
        - make TARGET=arduino_uno_r4wifi FIRMWARE_PRODUCT=nfc NFC_USB_MODE=cdc INSTALL_DEPS=0 AUTO_INSTALL_LINUX_DEPS=0 firmware-compile-db
      compile_commands_json: build/lint/firmware/arduino_uno_r4wifi/nfc/cdc/compile_commands.json
      source: firmware
    - commands:
        - make TARGET=arduino_uno_r4wifi FIRMWARE_PRODUCT=reader NFC_USB_MODE=ccid INSTALL_DEPS=0 AUTO_INSTALL_LINUX_DEPS=0 firmware-compile-db
      compile_commands_json: build/lint/firmware/arduino_uno_r4wifi/reader/ccid/compile_commands.json
      source: firmware
    - commands:
        - make TARGET=arduino_uno_r4wifi FIRMWARE_PRODUCT=reader NFC_USB_MODE=cdc INSTALL_DEPS=0 AUTO_INSTALL_LINUX_DEPS=0 firmware-compile-db
      compile_commands_json: build/lint/firmware/arduino_uno_r4wifi/reader/cdc/compile_commands.json
      source: firmware
    - commands:
        - make TARGET=arduino_uno_r4wifi FIRMWARE_PRODUCT=writer NFC_USB_MODE=cdc INSTALL_DEPS=0 AUTO_INSTALL_LINUX_DEPS=0 firmware-compile-db
      compile_commands_json: build/lint/firmware/arduino_uno_r4wifi/writer/cdc/compile_commands.json
      source: firmware
    - commands:
        - make TARGET=nucleo_wba65ri FIRMWARE_PRODUCT=nfc NFC_USB_MODE=cdc INSTALL_DEPS=0 AUTO_INSTALL_LINUX_DEPS=0 firmware-compile-db
      compile_commands_json: build/lint/firmware/nucleo_wba65ri/nfc/cdc/compile_commands.json
      source: firmware
    - commands:
        - make TARGET=nucleo_wba65ri FIRMWARE_PRODUCT=reader NFC_USB_MODE=ccid INSTALL_DEPS=0 AUTO_INSTALL_LINUX_DEPS=0 firmware-compile-db
      compile_commands_json: build/lint/firmware/nucleo_wba65ri/reader/ccid/compile_commands.json
      source: firmware
    - commands:
        - make TARGET=nucleo_wba65ri FIRMWARE_PRODUCT=reader NFC_USB_MODE=cdc INSTALL_DEPS=0 AUTO_INSTALL_LINUX_DEPS=0 firmware-compile-db
      compile_commands_json: build/lint/firmware/nucleo_wba65ri/reader/cdc/compile_commands.json
      source: firmware
    - commands:
        - make TARGET=nucleo_wba65ri FIRMWARE_PRODUCT=writer NFC_USB_MODE=cdc INSTALL_DEPS=0 AUTO_INSTALL_LINUX_DEPS=0 firmware-compile-db
      compile_commands_json: build/lint/firmware/nucleo_wba65ri/writer/cdc/compile_commands.json
      source: firmware
  userspace:
    - cmake_args:
        - -DCMAKE_BUILD_TYPE=Release
        - -DNERO_TESTS_ENABLE_PCSC=ON
      compile_commands_json: build/lint/tests/compile_commands.json
      source: tests
    - cmake_args:
        - -DCMAKE_BUILD_TYPE=Release
      compile_commands_json: build/lint/userspace/compile_commands.json
      source: userspace

enabled_lint_jobs:
  - banned_cxx_heap
  - banned_libc_io
  - clang_tidy
  - compile_db
  - cppcheck
  - duplicate_includes
  - firmware_build
  - firmware_compile_db
  - format
  - guard_clause_style
  - license
  - magic_literals
  - markdownlint
  - nolint_audit
  - null_nodiscard
  - openssf
  - pointer_bounds
  - raii_lifetime
  - relative_includes
  - shared_constant_dupes
  - spec_traceability
  - yamllint

firmware_build:
  commands:
    - make TARGET=arduino_uno_r4wifi FIRMWARE_PRODUCT=nfc NFC_USB_MODE=cdc INSTALL_DEPS=0 AUTO_INSTALL_LINUX_DEPS=0 firmware
