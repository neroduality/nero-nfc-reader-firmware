# Code scanning — C/C++ via CMake tests + userspace + traced Arduino \`make nfc\`
# for both boards (Debian sid container, same family as Main CI).
# Runs on manual dispatch only.
# Local reproduction: make codeql-local
# Download SARIF: workflow run → Artifacts → codeql-cpp-sarif
name: CodeQL

on:
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded pull-request runs; never cancel a default-branch scan.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  analyze:
    name: Analyze (cpp)
    runs-on: ubuntu-24.04
    container:
      image: debian:sid-slim@sha256:54f7a23f03be1e9fe2849c61a7455588ea29b84c1659440f8ece2aea4c9871af
      options: --platform linux/amd64
    timeout-minutes: 360
    permissions:
      contents: read
      security-events: write
      # Required when CodeQL init/analyze run inside a job container (GitHub docs).
      actions: read

    env:
      # Manual traced C++ builds are incompatible with overlay-base caching on
      # default-branch runs; disable overlay up front to avoid analyze warnings.
      CODEQL_OVERLAY_DATABASE_MODE: none

    steps:
      # Inline: repo scripts are not available until after checkout.
      - name: Install checkout prerequisites
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq
            apt-get install -y --no-install-recommends ca-certificates git tar
          elif command -v dnf >/dev/null 2>&1; then
            dnf install -y --setopt=install_weak_deps=False ca-certificates git tar
            dnf clean all
          else
            printf 'error: unsupported base image (need apt-get or dnf)\n' >&2
            exit 1
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Bootstrap container (CA certs, git)
        run: bash .github/scripts/ci-bootstrap-container.sh

      - name: Install build dependencies
        env:
          AUTO_INSTALL_LINUX_DEPS: "1"
          INSTALL_DEPS: "1"
          INSTALL_LINT_DEPS: "0"
        run: bash make/install-linux-deps.sh

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: cpp
          build-mode: manual
          config-file: .github/codeql/codeql-config.yml
          # Bundle URL required (bare "2.26.0" is treated as a local path). Matches local CLI v2.26.0.
          tools: https://github.com/github/codeql-action/releases/download/codeql-bundle-v2.26.0/codeql-bundle-linux64.tar.zst

      - name: CodeQL traced build (CMake + firmware)
        env:
          # Include firmware: \`make nfc\` on both boards. Script default is also 1;
          # set explicitly so CI does not silently diverge from local runs.
          CODEQL_INCLUDE_FIRMWARE: "1"
        run: bash .github/scripts/codeql-build.sh

      - name: Perform CodeQL analysis
        id: analyze
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: "/language:cpp"
          output: codeql-results

      - name: Upload CodeQL SARIF artifact
        if: always() && steps.analyze.outcome != 'skipped'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codeql-cpp-sarif
          path: codeql-results/
          if-no-files-found: warn
          retention-days: 30
          compression-level: 6
