# Fast local checks aligned with make lint (subset only).
# Arduino .ino files are formatted in full lint — not duplicated here.
#
#   pip install pre-commit
#   pre-commit install
#
# See README.md and tests/README.md for the full local verification flow.
#
# Paths may be repo-relative or nested under a parent repo; exclude patterns match
# path substrings so hooks behave in standalone clones and monorepos alike.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: (third-party/|nero-nfc-st25r-examples/)
      - id: end-of-file-fixer
        exclude: (third-party/|nero-nfc-st25r-examples/)
      - id: check-merge-conflict
      - id: check-yaml
        args: [--unsafe]
        exclude: (third-party/|nero-nfc-st25r-examples/)

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        types_or: [c++, c]
        exclude: (third-party/|nero-nfc-st25r-examples/)

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        exclude: (third-party/|nero-nfc-st25r-examples/)
