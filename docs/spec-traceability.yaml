# Spec traceability — nero-nfc-reader-firmware
#
# Single authoritative manifest: normative spec literals extracted from external
# documents, mapped to firmware symbols.
#
# Fields per entry:
#   spec_prefix — SPEC Prefix tag ([T2T-ISO14443-A-NTAG21x], [ISO14443-3], …)
#   symbol      — firmware symbol name (#define, enum constant, or constexpr/const)
#   spec_value  — normative literal from the cited spec (decimal or 0x hex)
#   ref         — clause / table / page in the spec document
#   source      — repo-relative file containing the symbol

