scan:
  c_api_prefix: nero_nfc
  c_macro_prefix: NERO_NFC
  exclude_gitignore: true
  public_headers_dir: firmware/libraries/NeroNfc/src
  source_roots:
    - firmware
    - tests
    - userspace

spec_traceability:
  manifest: docs/spec-traceability.yaml

toolchain:
  lint_kit:
    path: lint-c-cpp
    ref: v0.2.0
    repository: neroduality/.github
  script: .github/scripts/helper-toolchain.sh

workflow:
  bare_vm_waivers:
    - job: publish
      workflow: release.yml
    - job: audit
      workflow: zizmor_actionlint.yml

yamllint:
  default:
    schema: yaml
  files:
    - path: .github/lint-c-cpp.yaml
      schema: lint_config
      sort_by: key
    - path: docs/spec-traceability.yaml
      required_fields:
        - ref
        - source
        - spec_prefix
        - spec_value
        - symbol
      schema: spec_traceability
      sort_by:
        - spec_prefix
        - symbol
