<?xml version="1.0"?>
<!-- Project-forbidden C APIs (unbounded I/O and shell invocation).
     Loaded via the cppcheck library option in ci-lint.sh.
     Prefer nero_nfc_copy_bytes / snprintf / bounded project helpers. -->
<def format="2">
  <function name="strcpy">
    <noreturn>false</noreturn>
    <warn severity="warning" reason="Unbounded copy" alternatives="nero_nfc_copy_bytes"/>
  </function>
  <function name="strcat">
    <noreturn>false</noreturn>
    <warn severity="warning" reason="Unbounded concat" alternatives="nero_nfc_copy_bytes"/>
  </function>
  <function name="sprintf">
    <noreturn>false</noreturn>
    <warn severity="warning" reason="Unbounded format" alternatives="snprintf"/>
  </function>
  <function name="vsprintf">
    <noreturn>false</noreturn>
    <warn severity="warning" reason="Unbounded format" alternatives="vsnprintf"/>
  </function>
  <function name="gets">
    <noreturn>false</noreturn>
    <warn severity="warning" reason="Removed from C11" alternatives="fgets"/>
  </function>
  <function name="scanf">
    <noreturn>false</noreturn>
    <warn severity="warning" reason="Unbounded input" alternatives="snscanf or parser helpers"/>
  </function>
  <function name="sscanf">
    <noreturn>false</noreturn>
    <warn severity="warning" reason="Unbounded input" alternatives="bounded parser helpers"/>
  </function>
  <function name="fscanf">
    <noreturn>false</noreturn>
    <warn severity="warning" reason="Unbounded input" alternatives="bounded parser helpers"/>
  </function>
  <function name="popen">
    <noreturn>false</noreturn>
    <warn severity="warning" reason="Shell invocation" alternatives="none in firmware"/>
  </function>
  <function name="system">
    <noreturn>false</noreturn>
    <warn severity="warning" reason="Shell invocation" alternatives="none in firmware"/>
  </function>
  <function name="atoi">
    <noreturn>false</noreturn>
    <warn severity="warning" reason="Unchecked parse" alternatives="nero_nfc_parse helpers"/>
  </function>
  <function name="atol">
    <noreturn>false</noreturn>
    <warn severity="warning" reason="Unchecked parse" alternatives="nero_nfc_parse helpers"/>
  </function>
  <function name="atoll">
    <noreturn>false</noreturn>
    <warn severity="warning" reason="Unchecked parse" alternatives="nero_nfc_parse helpers"/>
  </function>
  <function name="strtol">
    <noreturn>false</noreturn>
    <warn severity="warning" reason="Unchecked parse" alternatives="nero_nfc_parse helpers"/>
  </function>
  <function name="strtoll">
    <noreturn>false</noreturn>
    <warn severity="warning" reason="Unchecked parse" alternatives="nero_nfc_parse helpers"/>
  </function>
  <function name="strtoul">
    <noreturn>false</noreturn>
    <warn severity="warning" reason="Unchecked parse" alternatives="nero_nfc_parse helpers"/>
  </function>
  <function name="strtoull">
    <noreturn>false</noreturn>
    <warn severity="warning" reason="Unchecked parse" alternatives="nero_nfc_parse helpers"/>
  </function>
  <function name="strtoimax">
    <noreturn>false</noreturn>
    <warn severity="warning" reason="Unchecked parse" alternatives="nero_nfc_parse helpers"/>
  </function>
  <function name="strtoumax">
    <noreturn>false</noreturn>
    <warn severity="warning" reason="Unchecked parse" alternatives="nero_nfc_parse helpers"/>
  </function>
</def>
