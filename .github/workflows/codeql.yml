# Code scanning — C/C++ via CMake (tests + userspace) plus traced Arduino firmware build (`make nfc`).
# Runs on manual dispatch only.
# Local reproduction: .github/scripts/run-codeql-locally.sh
name: CodeQL

on:
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded pull-request runs; never cancel a default-branch scan.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (cpp)
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    permissions:
      contents: read
      security-events: write

    env:
      # Manual traced C++ builds are incompatible with overlay-base caching on
      # default-branch runs; disable overlay up front to avoid analyze warnings.
      CODEQL_OVERLAY_DATABASE_MODE: none

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install dependencies (CMake, Arduino CLI, board core, toolchain deps)
        env:
          FIRMWARE_ROOT: ${{ github.workspace }}
          AUTO_INSTALL_LINUX_DEPS: "1"
          INSTALL_DEPS: "1"
        run: bash make/install-linux-deps.sh

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: cpp
          build-mode: manual
          config-file: .github/codeql/codeql-config.yml

      - name: CodeQL traced build (CMake + Arduino firmware)
        env:
          FIRMWARE_ROOT: ${{ github.workspace }}
          CODEQL_INCLUDE_ARDUINO: "1"
        run: bash .github/scripts/codeql-build.sh

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:cpp"
