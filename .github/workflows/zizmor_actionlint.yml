# GitHub Actions static analysis (manual only).
# Local reproduction: bash .github/scripts/run-security-suite-locally.sh
#   (or run-zizmor-locally.sh / run-actionlint-locally.sh individually)
name: Zizmor + actionlint

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: zizmor-${{ github.workflow }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  audit:
    name: zizmor + actionlint
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Run zizmor
        run: uvx zizmor==1.26.1 --offline --color=always .

      # actionlint complements zizmor: workflow correctness + expression typing +
      # the shellcheck of `run:` scripts. Reuses the local runner (container mode).
      - name: Run actionlint
        run: bash .github/scripts/run-actionlint-locally.sh --container -color
